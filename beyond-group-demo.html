<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beyond Group — Insulation Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1f2436;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --accent: #e8a04a; --accent2: #f0c07a; --text: #f0ede8;
      --text2: #9a96a0; --text3: #6a6670; --green: #4caf82; --blue: #5b9cf0;
      --radius: 14px; --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
    .header-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); }
    .header-logo span { color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; margin-left: 10px; }
    .header-badge { font-size: 11px; font-weight: 500; color: var(--green); background: rgba(76,175,130,0.12); border: 1px solid rgba(76,175,130,0.25); padding: 4px 10px; border-radius: 20px; }
    .main { flex: 1; display: flex; max-width: 860px; width: 100%; margin: 0 auto; padding: 32px 20px; gap: 24px; }
    .sidebar { width: 220px; flex-shrink: 0; }
    .sidebar-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; }
    .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; transition: border-color 0.3s; }
    .agent-card.active { border-color: var(--accent); }
    .agent-card.done { border-color: var(--green); }
    .agent-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .agent-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
    .agent-card.active .agent-dot { background: var(--accent); }
    .agent-card.done .agent-dot { background: var(--green); }
    .agent-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }
    .agent-status { font-size: 11px; margin-top: 8px; font-weight: 500; }
    .agent-card.active .agent-status { color: var(--accent); }
    .agent-card.done .agent-status { color: var(--green); }
    .handoff-arrow { text-align: center; color: var(--text3); font-size: 18px; margin: 4px 0; transition: color 0.3s; }
    .handoff-arrow.active { color: var(--accent); }
    .chat-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; overflow-y: auto; min-height: 420px; max-height: 520px; display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; gap: 10px; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
    .msg.bot .msg-avatar { background:rgba(232,160,74,0.15); color:var(--accent); border:1px solid rgba(232,160,74,0.3); }
    .msg.user .msg-avatar { background:rgba(91,156,240,0.15); color:var(--blue); border:1px solid rgba(91,156,240,0.3); }
    .msg-bubble { max-width:75%; padding:11px 15px; border-radius:var(--radius-sm); font-size:14px; line-height:1.6; }
    .msg.bot .msg-bubble { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
    .msg.user .msg-bubble { background:rgba(91,156,240,0.12); color:var(--text); border:1px solid rgba(91,156,240,0.2); }
    .typing { display:flex; gap:10px; align-items:center; animation:fadeUp 0.2s ease; }
    .typing-avatar { width:30px; height:30px; border-radius:50%; background:rgba(232,160,74,0.15); color:var(--accent); border:1px solid rgba(232,160,74,0.3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
    .typing-dots { display:flex; gap:5px; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; }
    .typing-dots span { width:6px; height:6px; border-radius:50%; background:var(--text3); animation:bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .status-bar { margin-top:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; display:flex; align-items:center; gap:10px; font-size:12px; color:var(--text2); }
    .status-step { display:flex; align-items:center; gap:5px; transition:color 0.3s; }
    .status-step.done { color:var(--green); }
    .status-step.active { color:var(--accent); }
    .status-sep { color:var(--text3); }
    .input-row { margin-top:12px; display:flex; gap:10px; }
    .chat-input { flex:1; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:12px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
    .chat-input:focus { border-color:var(--accent); }
    .chat-input::placeholder { color:var(--text3); }
    .send-btn { background:var(--accent); color:#1a1000; border:none; border-radius:var(--radius-sm); padding:12px 20px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.2s,opacity 0.2s; }
    .send-btn:hover { background:var(--accent2); }
    .send-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .email-preview { margin-top:14px; background:var(--surface); border:1px solid rgba(76,175,130,0.3); border-radius:var(--radius); padding:18px 20px; animation:fadeUp 0.3s ease; }
    .email-preview-title { font-size:12px; font-weight:600; letter-spacing:0.08em; color:var(--green); text-transform:uppercase; margin-bottom:12px; }
    .email-preview-body { font-size:13px; color:var(--text2); line-height:1.8; white-space:pre-wrap; }
    .config-panel { max-width:540px; margin:60px auto; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:36px; }
    .config-title { font-family:'DM Serif Display',serif; font-size:26px; color:var(--accent); margin-bottom:6px; }
    .config-sub { font-size:14px; color:var(--text2); margin-bottom:28px; }
    .field-label { font-size:12px; font-weight:600; letter-spacing:0.06em; color:var(--text3); text-transform:uppercase; margin-bottom:6px; }
    .field-input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:11px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; margin-bottom:16px; transition:border-color 0.2s; }
    .field-input:focus { border-color:var(--accent); }
    .start-btn { width:100%; background:var(--accent); color:#1a1000; border:none; border-radius:var(--radius-sm); padding:14px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; transition:background 0.2s; }
    .start-btn:hover { background:var(--accent2); }
    .config-note { font-size:12px; color:var(--text3); margin-top:14px; line-height:1.6; }
    .email-note { font-size:12px; color:var(--accent); background:rgba(232,160,74,0.08); border:1px solid rgba(232,160,74,0.2); border-radius:6px; padding:10px 12px; margin-bottom:16px; line-height:1.6; }
    @media(max-width:640px) { .main{flex-direction:column;padding:16px;} .sidebar{width:100%;} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// FIX 1: Agent now asks for name/email naturally with context,
// and asks BEFORE collecting service details so it feels like a warm intro.
// FIX 2: Full pricing added for all Beyond Group services.
const AGENT1_SYSTEM = `You are a friendly customer service assistant for Beyond Group, a Calgary-based construction and insulation company serving residential, commercial, and industrial clients since 2006.

Beyond Group services:
- Spray foam insulation (open cell and closed cell)
- Attic insulation
- Batt & poly insulation
- Drywall
- Asbestos removal and abatement
- Thermal scan inspections
- Flat roofing and roof coatings
- Fireproofing and firestopping
- Concrete lifting and levelling
- Sidewalk and driveway repair

Your personality: warm, patient, conversational — like a helpful neighbour. Never pushy.

IMPORTANT RULES:
- Ask only ONE question per message. Never stack questions.
- Keep messages to 2-3 sentences max.
- If the customer goes off-topic, respond warmly and briefly, then gently return to where you left off.
- When asking about timeline: if the answer is vague like "soon", "this month", or "next month", kindly ask for a more specific date range like "March 24 to March 30".

CONVERSATION ORDER — follow this sequence:
1. Warm greeting. Briefly introduce Beyond Group and mention the range of services (insulation, roofing, concrete lifting, asbestos removal, etc.). Then ask what brings them in today.
2. Ask what service or type of work they are looking for.
3. If they say "insulation", ask which type: spray foam, attic insulation, batt & poly, or they are not sure. If they say another service (roofing, concrete, asbestos, etc.) skip this step.
4. Ask what type of space (attic, basement, crawl space, garage, commercial building, driveway, etc.).
5. Ask approximate square footage or area size.
6. Ask their location. If they say rural Alberta, follow up and ask for the specific town or community name.
7. Ask preferred timeline. Follow up if vague — get a specific date range.
8. Ask for their first name, mentioning it helps personalize the follow-up.
9. Ask for their email address, explaining the team will send a confirmation and follow up with next steps.
10. Give the estimate warmly and let them know the Beyond Group team will reach out.

PRICING GUIDE:
Spray foam / attic / batt insulation:
- Under 400 sqft: $1,500 to $3,000
- 400 to 800 sqft: $3,000 to $6,000
- 800 to 1,200 sqft: $6,000 to $11,000
- Full home or very large: $10,000 to $20,000+

Flat roofing (Calgary):
- Small flat roof under 1,000 sqft: $8,000 to $12,000
- Mid-size 1,000 to 2,000 sqft: $12,000 to $20,000
- Large commercial: $20,000+

Concrete lifting and levelling:
- Small area (driveway section, sidewalk): $800 to $2,000
- Medium project: $2,000 to $5,000
- Large commercial slab: $5,000+

Asbestos removal:
- Small area (ceiling tiles, small room): $1,500 to $4,000
- Medium (insulation, larger room): $4,000 to $10,000
- Large or whole-home: $10,000 to $30,000+

Fireproofing / firestopping and thermal scans: pricing varies by scope — always recommend a free site visit.

Always mention that these are rough estimates and a free on-site consultation is available for an accurate quote.

Once you have all info (name, service, space type, size, location, timeline, email), give the estimate warmly. Then tell them a summary will go to the Beyond Group team. Then output ONLY this on a new line with nothing after it:

HANDOFF_JSON:{"name":"...","email":"...","service_type":"...","space_type":"...","square_footage":"...","location":"...","timeline":"...","estimate_range":"...","summary":"..."}

The summary should be 2-3 sentences describing the lead clearly for the Beyond Group team.`;

const AGENT2_SYSTEM = `You are an internal notification email writer for Beyond Group, a Calgary insulation and construction company.

You receive structured lead data from the customer chatbot. Write a clean, professional plain-text email for the Beyond Group service team.

Write it exactly like this:

Subject: New Lead — [customer name] — [service type]

Hi Beyond Group Team,

A new lead just came in through the Beyond Group AI assistant. Here are the details:

Name: [name]
Email: [email]
Service requested: [service]
Space type: [space]
Area size: [sqft]
Location: [location]
Preferred timeline: [timeline]
Estimate given: [estimate]

Summary:
[summary]

The customer has been given a rough estimate and is expecting a follow-up from your team.

— Beyond Group AI Assistant`;

function ConfigScreen({ onStart }) {
  const [keys, setKeys] = useState({ claudeKey:'', emailjsService:'', emailjsTemplate:'', emailjsPublic:'', recipientEmail:'' });
  const allFilled = Object.values(keys).every(v => v.trim() !== '');
  return (
    <div style={{padding:'20px'}}>
      <div className="config-panel">
        <div className="config-title">Beyond Group</div>
        <div className="config-sub">AI Assistant Demo — Enter your keys to launch</div>
        <div className="email-note">
          ⚠ EmailJS template fix: your template must use only two variables:<br/>
          <strong>{"{{to_email}}"}</strong> and <strong>{"{{message}}"}</strong><br/>
          Set the "To Email" field to {"{{to_email}}"} and the body to {"{{message}}"}.
        </div>
        {[
          ['claudeKey','Claude API Key','password','sk-ant-...'],
          ['emailjsService','EmailJS Service ID','text','service_xxxxxxx'],
          ['emailjsTemplate','EmailJS Template ID','text','template_xxxxxxx'],
          ['emailjsPublic','EmailJS Public Key','text','xxxxxxxxxxxxxx'],
          ['recipientEmail','Send Lead Emails To','email','you@gmail.com']
        ].map(([k, label, type, ph]) => (
          <div key={k}>
            <div className="field-label">{label}</div>
            <input className="field-input" type={type} placeholder={ph} value={keys[k]} onChange={e=>setKeys({...keys,[k]:e.target.value})}/>
          </div>
        ))}
        <button className="start-btn" onClick={() => allFilled ? onStart(keys) : alert('Please fill in all fields.')}>Launch Demo →</button>
        <div className="config-note">⚠ Keys are stored in memory only and never logged or shared.</div>
      </div>
    </div>
  );
}

function ChatScreen({ config }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [stage, setStage] = useState('agent1');
  const [emailDraft, setEmailDraft] = useState('');
  const [emailSent, setEmailSent] = useState(false);
  const [emailError, setEmailError] = useState('');
  const [leadData, setLeadData] = useState(null);
  const convRef = useRef([]);
  const chatBoxRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { startConversation(); }, []);
  useEffect(() => { if (chatBoxRef.current) chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight; }, [messages, loading]);
  useEffect(() => { if (!loading && stage === 'agent1' && inputRef.current) inputRef.current.focus(); }, [loading, stage]);

  const callClaude = async (system, msgs) => {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': config.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-haiku-4-5', max_tokens: 1000, system, messages: msgs })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  };

  const startConversation = async () => {
    setLoading(true);
    const initMsgs = [{ role:'user', content:'Hi, I need some help.' }];
    convRef.current = initMsgs;
    try {
      const reply = await callClaude(AGENT1_SYSTEM, initMsgs);
      convRef.current = [...initMsgs, { role:'assistant', content:reply }];
      setMessages([{ role:'bot', text:reply }]);
    } catch(e) {
      setMessages([{ role:'bot', text:'Sorry, could not connect. Please check your Claude API key.' }]);
    }
    setLoading(false);
  };

  const handleSend = async () => {
    if (!input.trim() || loading || stage !== 'agent1') return;
    const userText = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role:'user', text:userText }]);
    setLoading(true);
    const newHistory = [...convRef.current, { role:'user', content:userText }];
    convRef.current = newHistory;
    try {
      const reply = await callClaude(AGENT1_SYSTEM, newHistory);
      convRef.current = [...newHistory, { role:'assistant', content:reply }];

      if (reply.includes('HANDOFF_JSON:')) {
        const [displayText, jsonPart] = reply.split('HANDOFF_JSON:');
        let parsed = null;
        try { parsed = JSON.parse(jsonPart.trim()); } catch(e) {}
        setMessages(prev => [...prev, { role:'bot', text:displayText.trim() }]);
        setLoading(false);

        if (parsed) {
          setLeadData(parsed);
          setStage('handoff');
          setTimeout(async () => {
            setStage('agent2');
            setMessages(prev => [...prev, { role:'system', text:'↻ Handing off to Agent 2 — composing your summary email...' }]);
            try {
              const prompt = `Lead data:\n\n${JSON.stringify(parsed, null, 2)}\n\nWrite the notification email for Curt.`;
              const emailContent = await callClaude(AGENT2_SYSTEM, [{ role:'user', content:prompt }]);

              // Also generate a friendly confirmation email for the customer
              const confirmPrompt = `Write a short, warm confirmation email to the customer.
Customer name: ${parsed.name}
Service requested: ${parsed.service_type}
Estimate given: ${parsed.estimate_range}
Their email: ${parsed.email}

Write it as plain text. First line must be: Subject: Your Beyond Group inquiry — we'll be in touch!
Then a blank line, then the body. Keep it friendly, 3-4 sentences. Sign off as "The Beyond Group Team".`;
              const confirmContent = await callClaude(AGENT2_SYSTEM, [{ role:'user', content:confirmPrompt }]);

              setEmailDraft(emailContent);
              setStage('sending');

              // Email 1: lead summary to Curt
              await emailjs.send(
                config.emailjsService,
                config.emailjsTemplate,
                { to_email: config.recipientEmail, message: emailContent },
                config.emailjsPublic
              );

              // Email 2: confirmation to customer
              if (parsed.email) {
                await emailjs.send(
                  config.emailjsService,
                  config.emailjsTemplate,
                  { to_email: parsed.email, message: confirmContent },
                  config.emailjsPublic
                );
              }

              setEmailSent(true);
              setEmailError('');
            } catch(e) {
              console.error('Error:', e);
              setEmailError('Email send failed: ' + (e.text || e.message || 'unknown error'));
            }
            setStage('done');
            setMessages(prev => [...prev, {
              role:'bot',
              text:`All done! A summary has been sent to the Beyond Group team and they will follow up with you at ${parsed.email}. Thanks, ${parsed.name || 'there'}!`
            }]);
          }, 1200);
        }
      } else {
        setMessages(prev => [...prev, { role:'bot', text:reply }]);
        setLoading(false);
      }
    } catch(e) {
      setMessages(prev => [...prev, { role:'bot', text:'Something went wrong. Please try again.' }]);
      setLoading(false);
    }
  };

  const handleKey = e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

  const stepStatus = step => {
    if (step==='collect') return stage==='agent1' ? 'active' : 'done';
    if (step==='handoff') { if (stage==='handoff') return 'active'; if (['agent2','sending','done'].includes(stage)) return 'done'; return ''; }
    if (step==='email') { if (['agent2','sending'].includes(stage)) return 'active'; if (stage==='done') return 'done'; return ''; }
  };

  const agent1State = stage==='agent1' ? 'active' : ['handoff','agent2','sending','done'].includes(stage) ? 'done' : '';
  const agent2State = ['agent2','sending'].includes(stage) ? 'active' : stage==='done' ? 'done' : '';

  return (
    <div>
      <div className="header">
        <div className="header-logo">Beyond Group <span>AI Assistant</span></div>
        <div className="header-badge">AI POWERED</div>
      </div>
      <div className="main">
        <div className="sidebar">
          <div className="sidebar-title">Agent Pipeline</div>
          <div className={`agent-card ${agent1State}`}>
            <div className="agent-name"><span className="agent-dot"></span>Agent 1</div>
            <div className="agent-desc">Intake & Estimator — collects info and gives a rough estimate</div>
            <div className="agent-status">{agent1State==='active'?'● Running...':agent1State==='done'?'✓ Complete':''}</div>
          </div>
          <div className={`handoff-arrow ${stage==='handoff'?'active':''}`}>↓</div>
          <div className={`agent-card ${agent2State}`}>
            <div className="agent-name"><span className="agent-dot"></span>Agent 2</div>
            <div className="agent-desc">Email Composer — drafts and sends lead summary to the team</div>
            <div className="agent-status">{agent2State==='active'?'● Running...':agent2State==='done'?'✓ Complete':''}</div>
          </div>
          {leadData && (
            <div style={{marginTop:'20px',padding:'12px',background:'rgba(76,175,130,0.08)',border:'1px solid rgba(76,175,130,0.2)',borderRadius:'8px',fontSize:'12px',color:'var(--text2)',lineHeight:'1.8'}}>
              <div style={{color:'var(--green)',fontWeight:600,marginBottom:'6px',fontSize:'11px',letterSpacing:'0.06em',textTransform:'uppercase'}}>Lead captured</div>
              <div><b>Name:</b> {leadData.name}</div>
              <div><b>Service:</b> {leadData.service_type}</div>
              <div><b>Size:</b> {leadData.square_footage}</div>
              <div><b>Estimate:</b> {leadData.estimate_range}</div>
            </div>
          )}
        </div>

        <div className="chat-wrap">
          <div className="chat-box" ref={chatBoxRef}>
            {messages.map((msg,i) => {
              if (msg.role==='system') return (
                <div key={i} style={{textAlign:'center',fontSize:'12px',color:'var(--accent)',padding:'6px 10px',background:'rgba(232,160,74,0.07)',borderRadius:'6px',border:'1px solid rgba(232,160,74,0.15)'}}>
                  {msg.text}
                </div>
              );
              return (
                <div key={i} className={`msg ${msg.role}`}>
                  <div className="msg-avatar">{msg.role==='bot'?'B':'Y'}</div>
                  <div className="msg-bubble">{msg.text}</div>
                </div>
              );
            })}
            {loading && (
              <div className="typing">
                <div className="typing-avatar">B</div>
                <div className="typing-dots"><span/><span/><span/></div>
              </div>
            )}
          </div>

          <div className="status-bar">
            <div className={`status-step ${stepStatus('collect')}`}>{stepStatus('collect')==='done'?'✓':'○'} Info collected</div>
            <div className="status-sep">→</div>
            <div className={`status-step ${stepStatus('handoff')}`}>{stepStatus('handoff')==='done'?'✓':'○'} Agent handoff</div>
            <div className="status-sep">→</div>
            <div className={`status-step ${stepStatus('email')}`}>
              {stepStatus('email')==='done'?'✓':'○'} Email {emailSent ? 'sent ✓' : emailError ? 'failed ✗' : 'pending'}
            </div>
          </div>

          {emailError && (
            <div style={{marginTop:'10px',padding:'10px 14px',background:'rgba(224,75,75,0.1)',border:'1px solid rgba(224,75,75,0.3)',borderRadius:'8px',fontSize:'12px',color:'#e04b4b'}}>
              ✗ {emailError}
            </div>
          )}

          {emailDraft && (
            <div className="email-preview">
              <div className="email-preview-title">✓ Agent 2 — Email Draft</div>
              <div className="email-preview-body">{emailDraft}</div>
            </div>
          )}

          {stage !== 'done' && (
            <div className="input-row">
              <input ref={inputRef} className="chat-input" placeholder="Type your message..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} disabled={loading||stage!=='agent1'}/>
              <button className="send-btn" onClick={handleSend} disabled={loading||!input.trim()||stage!=='agent1'}>Send</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [config, setConfig] = useState(null);
  if (!config) return <ConfigScreen onStart={setConfig}/>;
  return <ChatScreen config={config}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
